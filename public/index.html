<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Collaborative Task Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <nav class="bg-white shadow-sm border-b border-gray-200 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800 tracking-tight flex items-center gap-2">
                📋 LiveTask Board
            </h1>
            <div class="flex items-center gap-2">
                <span class="inline-block w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-sm text-gray-600 font-medium" id="connection-status">Connecting...</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="bg-white p-4 rounded-xl shadow-sm mb-8 border border-gray-200">
            <form id="task-form" class="flex flex-col sm:flex-row gap-3">
                <input 
                    type="text" 
                    id="task-title" 
                    placeholder="Enter a new task title..." 
                    required
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
                >
                <button 
                    type="submit"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-2 rounded-lg transition-colors duration-150 text-sm whitespace-nowrap"
                >
                    Add Task
                </button>
            </form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 flex flex-col min-h-[500px]">
                <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-200">
                    <h2 class="font-semibold text-gray-700 uppercase tracking-wider text-xs">📌 To Do</h2>
                    <span id="todo-count" class="bg-gray-200 text-gray-700 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span>
                </div>
                <div id="todo-list" class="space-y-3 flex-1 overflow-y-auto">
                    </div>
            </div>

            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 flex flex-col min-h-[500px]">
                <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-200">
                    <h2 class="font-semibold text-yellow-700 uppercase tracking-wider text-xs">⚡ In Progress</h2>
                    <span id="progress-count" class="bg-yellow-100 text-yellow-800 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span>
                </div>
                <div id="progress-list" class="space-y-3 flex-1 overflow-y-auto">
                    </div>
            </div>

            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 flex flex-col min-h-[500px]">
                <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-200">
                    <h2 class="font-semibold text-green-700 uppercase tracking-wider text-xs">✅ Done</h2>
                    <span id="done-count" class="bg-green-100 text-green-800 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span>
                </div>
                <div id="done-list" class="space-y-3 flex-1 overflow-y-auto">
                    </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script>
        const socket = io('https://task-board-backend-uzor.onrender.com');
        const statusEl = document.getElementById('connection-status');
        const taskForm = document.getElementById('task-form');
        const taskTitleInput = document.getElementById('task-title');

        // Column DOM Mappings
        const columns = {
            todo: document.getElementById('todo-list'),
            progress: document.getElementById('progress-list'),
            done: document.getElementById('done-list')
        };

        const counts = {
            todo: document.getElementById('todo-count'),
            progress: document.getElementById('progress-count'),
            done: document.getElementById('done-count')
        };

        // State storage for rendering tracking
        let tasksState = [];

        // Update real-time connection status indicator
        socket.on('connect', () => {
            statusEl.textContent = 'Live Sync Active';
            statusEl.className = 'text-sm text-green-600 font-medium';
        });
        socket.on('disconnect', () => {
            statusEl.textContent = 'Disconnected';
            statusEl.className = 'text-sm text-red-600 font-medium';
        });

        // Fetch initial tasks from database
        async function fetchTasks() {
            try {
                const response = await fetch('https://task-board-backend-uzor.onrender.com/api/tasks');
                tasksState = await response.json();
                renderBoard();
            } catch (err) {
                console.error('Error loading tasks:', err);
            }
        }

        // Render the entire Kanban layout based on local state
        function renderBoard() {
            // Clear existing lists
            Object.values(columns).forEach(col => col.innerHTML = '');
            
            // Set up count accumulators
            const countTracker = { todo: 0, progress: 0, done: 0 };

            tasksState.forEach(task => {
                countTracker[task.status]++;
                
                // Construct clean Task UI element
                const taskCard = document.createElement('div');
                taskCard.className = "bg-white p-4 rounded-lg shadow-sm border border-gray-100 flex flex-col gap-3 group hover:shadow-md transition-shadow duration-150";
                taskCard.innerHTML = `
                    <p class="text-sm font-medium text-gray-800">${task.title}</p>
                    <div class="flex justify-between items-center mt-2 pt-2 border-t border-gray-50">
                        <button onclick="deleteTask('${task._id}')" class="text-xs text-red-500 hover:text-red-700 font-medium transition-colors">
                            Delete
                        </button>
                        <div class="flex gap-1">
                            ${task.status !== 'todo' ? `<button onclick="moveTask('${task._id}', 'todo')" class="bg-gray-100 hover:bg-gray-200 text-gray-700 text-[10px] px-2 py-1 rounded font-medium">← To Do</button>` : ''}
                            ${task.status !== 'progress' ? `<button onclick="moveTask('${task._id}', 'progress')" class="bg-yellow-50 hover:bg-yellow-100 text-yellow-700 text-[10px] px-2 py-1 rounded font-medium">⚡ Work</button>` : ''}
                            ${task.status !== 'done' ? `<button onclick="moveTask('${task._id}', 'done')" class="bg-green-50 hover:bg-green-100 text-green-700 text-[10px] px-2 py-1 rounded font-medium">Done →</button>` : ''}
                        </div>
                    </div>
                `;
                
                if (columns[task.status]) {
                    columns[task.status].appendChild(taskCard);
                }
            });

            // Sync structural counter badges
            Object.keys(counts).forEach(status => {
                counts[status].textContent = countTracker[status];
            });
        }

        // Submit new task via API
        taskForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = taskTitleInput.value.trim();
            if (!title) return;

            try {
                await fetch('https://task-board-backend-uzor.onrender.com/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });
                taskTitleInput.value = '';
            } catch (err) {
                console.error('Error posting task:', err);
            }
        });

        // Trigger database update for moving task status
        async function moveTask(id, newStatus) {
            try {
                await fetch(`https://task-board-backend-uzor.onrender.com/api/tasks/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
            } catch (err) {
                console.error('Error shifting task status:', err);
            }
        }

        // Trigger deletion handling
        async function deleteTask(id) {
            try {
                await fetch(`https://task-board-backend-uzor.onrender.com/api/tasks/${id}`, { method: 'DELETE' });
            } catch (err) {
                console.error('Error deleting task asset:', err);
            }
        }

        // --- REAL-TIME EVENT STREAM INTERFACES ---

        socket.on('task_created', (newTask) => {
            tasksState.unshift(newTask);
            renderBoard();
        });

        socket.on('task_updated', (updatedTask) => {
            const index = tasksState.findIndex(t => t._id === updatedTask._id);
            if (index !== -1) {
                tasksState[index] = updatedTask;
                renderBoard();
            }
        });

        socket.on('task_deleted', (deletedId) => {
            tasksState = tasksState.filter(t => t._id !== deletedId);
            renderBoard();
        });

        // Bootstrapping initialization
        window.addEventListener('DOMContentLoaded', fetchTasks);
    </script>
</body>
</html>
